
<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agentz Factory | AI Orchestration IDE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              heading: ['Space Grotesk', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
              sans: ['Plus Jakarta Sans', 'sans-serif'],
            },
            borderRadius: {
              'xl': '0.75rem',
              '2xl': '1rem',
              '3xl': '1.5rem',
            },
            colors: {
              obsidian: '#000000',
              brand: {
                orange: '#fb923c', // Lighter orange
                red: '#dc2626',
                dark: '#0a0a0a',
              }
            }
          },
        },
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
      :root {
        --brand-bg: #000000;
        --brand-text: #ffffff;
        --brand-border: rgba(255, 255, 255, 0.1);
      }
      
      body {
        margin: 0;
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: var(--brand-bg);
        color: var(--brand-text);
        overflow: hidden;
        width: 100vw;
        height: 100vh;
        letter-spacing: -0.01em;
      }
      
      #bg-canvas {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: auto;
      }

      .factory-gradient-text {
        background: linear-gradient(135deg, #fb923c 0%, #dc2626 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .factory-gradient-bg {
        background: linear-gradient(135deg, #fb923c, #dc2626);
      }

      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }

      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      @keyframes slow-glow {
        0%, 100% { opacity: 0.2; transform: scale(1); }
        50% { opacity: 0.4; transform: scale(1.1); }
      }
      .animate-slow-glow { animation: slow-glow 10s ease-in-out infinite; }
      
      #root {
        position: relative;
        z-index: 10;
        pointer-events: none;
        width: 100%;
        height: 100%;
      }

      /* Re-enable pointer events for interactive elements */
      #root > * {
        pointer-events: auto;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom": "https://esm.sh/react-dom@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "three": "https://esm.sh/three@0.173.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <canvas id="bg-canvas"></canvas>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
